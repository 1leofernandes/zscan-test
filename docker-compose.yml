version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: zscan-db
    environment:
      POSTGRES_USER: ${DB_USER:-zscan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zscan123}
      POSTGRES_DB: ${DB_NAME:-zscan_main}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zscan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zscan-network

  redis:
    image: redis:7-alpine
    container_name: zscan-redis
    # command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:- }
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zscan-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: zscan-api
    image: zscan-api:latest
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-zscan}
      DB_PASSWORD: ${DB_PASSWORD:-zscan123}
      DB_NAME: ${DB_NAME:-zscan_main}
      API_PORT: ${API_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-super-secret-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production-refresh-secret}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600s}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800s}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DB_LOGGING: "true"
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api/src:/app/src
      - ./api/dist:/app/dist
    command: npm run start:dev
    networks:
      - zscan-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s 
      retries: 5 

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: zscan-web
    image: zscan-web:latest
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3000
      NEXTAUTH_URL: http://web:3001
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - zscan-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  zscan-network:
    driver: bridge
